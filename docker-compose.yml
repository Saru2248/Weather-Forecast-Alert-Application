version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_api
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db        # Persist SQLite database
      - ./logs:/app/logs    # Persist logs
    environment:
      - DATABASE_URL=sqlite:///./db/weather.db
      - REFRESH_INTERVAL_MINUTES=180
      - DEBUG=False
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Dashboard ────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    command: streamlit run frontend/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

  # ── Scheduler (Background Jobs) ────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_scheduler
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///./db/weather.db
    command: python jobs/refresh.py
    depends_on:
      - api
    restart: unless-stopped
